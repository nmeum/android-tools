# Builds a fastboot binary for Linux x86_64 and aarch64 and attaches them to a GitHub Release.

name: Release fastboot

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build fastboot (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - arch: x86_64
            artifact: fastboot-linux-x86_64
            runs-on: ubuntu-latest
          - arch: aarch64
            artifact: fastboot-linux-aarch64
            runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev \
            libgtest-dev \
            libbrotli-dev \
            liblz4-dev \
            libzstd-dev \
            libselinux1-dev \
            libpcre2-dev \
            libusb-1.0-0-dev \
            libprotobuf-dev \
            protobuf-compiler \
            pkg-config

      - name: Set git identity
        run: |
          git config --global user.email "ci@smlight.tech"
          git config --global user.name "SMLIGHT CI"

      - name: Configure (fastboot only)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_TOOLS_USE_BUNDLED_FMT=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DProtobuf_USE_STATIC_LIBS=ON

      - name: Build fastboot
        run: cmake --build build --target fastboot --parallel

      - name: Smoke test
        run: |
          ./build/vendor/fastboot --version
          file ./build/vendor/fastboot
          ldd ./build/vendor/fastboot || true

      - name: Rename binary
        run: |
          strip build/vendor/fastboot
          cp build/vendor/fastboot ${{ matrix.artifact }}

      - name: Print sha256
        run: sha256sum ${{ matrix.artifact }}

      - name: Upload artifact (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach binary to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact }}
