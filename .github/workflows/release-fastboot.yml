# Builds a fastboot binary for Linux x86_64 and attaches it to a GitHub Release.
#
# To publish a new build:
#   git tag v35.0.2-smlight.1   # (or increment the smlight suffix for patches)
#   git push origin <tag>
# Then create a GitHub Release from that tag — the binary will be attached automatically.
# You can also trigger a test build without a release via workflow_dispatch (artifact only).

name: Release fastboot

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build fastboot (Linux x86_64 static)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev \
            libgtest-dev \
            libbrotli-dev \
            liblz4-dev \
            libzstd-dev \
            libselinux1-dev \
            libpcre2-dev \
            libusb-1.0-0-dev \
            libprotobuf-dev \
            protobuf-compiler \
            pkg-config

      - name: Set git identity
        run: |
          git config --global user.email "ci@smlight.tech"
          git config --global user.name "SMLIGHT CI"

      - name: Configure (fastboot only)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_TOOLS_USE_BUNDLED_FMT=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DProtobuf_USE_STATIC_LIBS=ON

      - name: Build fastboot
        run: cmake --build build --target fastboot --parallel

      - name: Smoke test
        run: |
          ./build/vendor/fastboot --version
          file ./build/vendor/fastboot
          ldd ./build/vendor/fastboot || true

      - name: Rename binary
        run: |
          strip build/vendor/fastboot
          cp build/vendor/fastboot fastboot-linux-x86_64

      - name: Print sha256
        run: sha256sum fastboot-linux-x86_64

      - name: Upload artifact (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: fastboot-linux-x86_64
          path: fastboot-linux-x86_64

      - name: Attach binary to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: fastboot-linux-x86_64
